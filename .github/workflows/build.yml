name: Build OfficeLego

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --clean officelego.spec

      - name: Smoke test (source)
        run: |
          python smoke_test.py
          python playback_test.py

      - name: Create zip
        run: |
          Copy-Item -Path "README-Windows.txt" -Destination "dist\OfficeLego\README-Windows.txt" -Force
          Copy-Item -Path "START.bat" -Destination "dist\OfficeLego\START.bat" -Force
          Copy-Item -Path "windows_launch.bat" -Destination "dist\OfficeLego\windows_launch.bat" -Force
          Copy-Item -Path "TEST.bat" -Destination "dist\OfficeLego\TEST.bat" -Force
          Copy-Item -Path "启动 OfficeLego.vbs" -Destination "dist\OfficeLego\启动 OfficeLego.vbs" -Force
          Copy-Item -Path "同事请看.txt" -Destination "dist\OfficeLego\同事请看.txt" -Force
          Compress-Archive -Path dist\OfficeLego -DestinationPath dist\OfficeLego-win.zip -Force

      - name: Smoke test (Windows exe)
        run: powershell -ExecutionPolicy Bypass -File win_smoke_test.ps1

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: OfficeLego-win
          path: dist/OfficeLego-win.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt pyinstaller

      - name: Build app
        run: |
          pyinstaller --noconfirm --clean --windowed --name OfficeLego \
            --osx-bundle-identifier com.officelego.app \
            --hidden-import=pynput.keyboard._darwin \
            --hidden-import=pynput.mouse._darwin \
            --hidden-import=ApplicationServices \
            --hidden-import=Quartz \
            --exclude-module keyboard \
            main.py
          cd dist && zip -r OfficeLego-mac.zip OfficeLego.app

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: OfficeLego-mac
          path: dist/OfficeLego-mac.zip
