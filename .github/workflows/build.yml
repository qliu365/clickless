name: Build Clickless

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --clean clickless.spec

      - name: Smoke test (source)
        run: python smoke_test.py

      - name: Create zip
        run: |
          Copy-Item -Path "README-Windows.txt" -Destination "dist\Clickless\README-Windows.txt" -Force
          Copy-Item -Path "START.bat" -Destination "dist\Clickless\START.bat" -Force
          Copy-Item -Path "windows_launch.bat" -Destination "dist\Clickless\windows_launch.bat" -Force
          Copy-Item -Path "TEST.bat" -Destination "dist\Clickless\TEST.bat" -Force
          Copy-Item -Path "启动 Clickless.vbs" -Destination "dist\Clickless\启动 Clickless.vbs" -Force
          Copy-Item -Path "同事请看.txt" -Destination "dist\Clickless\同事请看.txt" -Force
          Compress-Archive -Path dist\Clickless -DestinationPath dist\Clickless-win.zip -Force

      - name: Smoke test (Windows exe)
        run: powershell -ExecutionPolicy Bypass -File win_smoke_test.ps1

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: Clickless-win
          path: dist/Clickless-win.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt pyinstaller

      - name: Build app
        run: |
          pyinstaller --noconfirm --clean --windowed --name Clickless \
            --osx-bundle-identifier com.clickless.app \
            --hidden-import=pynput.keyboard._darwin \
            --hidden-import=pynput.mouse._darwin \
            --hidden-import=ApplicationServices \
            --hidden-import=Quartz \
            --exclude-module keyboard \
            main.py
          cd dist && zip -r Clickless-mac.zip Clickless.app

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: Clickless-mac
          path: dist/Clickless-mac.zip
